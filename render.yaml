services:
  - type: web
    name: preventai
    runtime: docker          # Docker handles both Python + Node in one container
    dockerfilePath: ./Dockerfile
    envVars:
      - key: LLM_PROVIDER
        value: gemini
      - key: LLM_MODEL
        value: gemini-2.0-flash
      - key: LLM_API_KEY
        sync: false           # Set this in the Render dashboard
      - key: JWT_SECRET
        generateValue: true   # Render auto-generates a secure random value
      - key: NODE_ENV
        value: production
      - key: ML_BACKEND_URL
        value: http://127.0.0.1:8001
      # After first deploy, update CORS_ORIGINS to your Render URL:
      # e.g. https://preventai.onrender.com
      - key: CORS_ORIGINS
        value: "*"
